name: CI Pipeline

on:
  push:
    branches:
      - development
      - staging
  pull_request:
    branches:
      - staging


env:
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0.x'


jobs:
  dev-ci:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch all tags
        run: git fetch --tags

      # Setup .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Setup Node.js for frontend
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/skill-swap-web/package-lock.json

      # Backend build and test
      - name: Setup backend environment variables
        run: |
          echo "ConnectionStrings__DefaultConnection=${{ secrets.SKILLSWAP_DB_CONNECTION }}" >> $GITHUB_ENV
          echo "Jwt__Key=${{ secrets.SKILLSWAP_JWT_KEY }}" >> $GITHUB_ENV
          echo "Jwt__Issuer=${{ vars.JWT_ISSUER }}" >> $GITHUB_ENV
          echo "Jwt__Audience=${{ vars.JWT_AUDIENCE }}" >> $GITHUB_ENV

      - name: Restore backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore --configuration Release

      - name: Run backend tests with coverage
        run: |
          dotnet test SkillSwap.Tests/SkillSwap.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger trx \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=TestResults/coverage.opencover.xml \
            /p:Exclude="[*]SkillSwap.*.Migrations.*"

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: TestResults/

      # Frontend build
      - name: Install frontend dependencies
        run: |
          cd frontend/skill-swap-web
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend/skill-swap-web
          npm run test -- --coverage --watchAll=false

      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/skill-swap-web/coverage/

      - name: Setup frontend environment variables
        run: |
          cd frontend/skill-swap-web
          echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.DEV_API_BASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_APP_ENV=development" >> .env.production

      - name: Build frontend
        run: |
          cd frontend/skill-swap-web
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-dev
          path: frontend/skill-swap-web/.next/


  staging-release:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch all tags
        run: git fetch --tags

      # Setup .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Setup Node.js for frontend
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/skill-swap-web/package-lock.json

      # Backend build and test
      - name: Setup backend environment variables
        run: |
          echo "ConnectionStrings__DefaultConnection=${{ secrets.SKILLSWAP_DB_CONNECTION_STAGING }}" >> $GITHUB_ENV
          echo "Jwt__Key=${{ secrets.SKILLSWAP_JWT_KEY }}" >> $GITHUB_ENV
          echo "Jwt__Issuer=${{ vars.JWT_ISSUER }}" >> $GITHUB_ENV
          echo "Jwt__Audience=${{ vars.JWT_AUDIENCE }}" >> $GITHUB_ENV

      - name: Restore backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore --configuration Release

      - name: Run backend tests with coverage
        run: |
          dotnet test SkillSwap.Tests/SkillSwap.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger trx \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=TestResults/coverage.opencover.xml \
            /p:Exclude="[*]SkillSwap.*.Migrations.*"

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-staging
          path: TestResults/

      # Frontend build
      - name: Install frontend dependencies
        run: |
          cd frontend/skill-swap-web
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend/skill-swap-web
          npm run test -- --coverage --watchAll=false

      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results-staging
          path: frontend/skill-swap-web/coverage/

      - name: Setup frontend environment variables
        run: |
          cd frontend/skill-swap-web
          echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.STAGING_API_BASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_APP_ENV=staging" >> .env.production

      - name: Build frontend
        run: |
          cd frontend/skill-swap-web
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/skill-swap-web/.next/

      # GitHub CLI setup for release management
      - name: Install GitHub CLI
        run: sudo apt-get install -y gh jq

      - name: Determine bump type from PR label
        run: |
          export GH_TOKEN=${{ github.token }}
          PR_NUMBER=$(gh pr list --state merged --base staging --json number -L 1 | jq -r '.[0].number')
          BUMP_TYPE=$(gh pr view $PR_NUMBER --json labels -q '.labels[].name' | grep -E 'major|minor|patch' || echo "patch")
          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_ENV

      - name: Calculate next semver
        run: |
          # Ensure we have all tags
          git fetch --tags --force
          
          # Get the latest tag, handling the case where no tags exist
          LAST_TAG=$(git tag -l | sort -V | tail -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          
          echo "Last tag found: $LAST_TAG"
          echo "Bump type: $BUMP_TYPE"
          
          # Extract version numbers, removing 'v' prefix
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<<"$VERSION"
          
          # Ensure all components are numbers (handle malformed tags)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          
          # Apply version bump
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR+1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH+1))
              ;;
          esac
          
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "Calculated next version: $NEW_TAG (from $LAST_TAG with $BUMP_TYPE bump)"

      - name: Generate release notes and update changelog
        run: |
          export GH_TOKEN=${{ github.token }}
          
          # Get PR information
          PR_NUMBER=$(gh pr list --state merged --base staging --json number -L 1 | jq -r '.[0].number')
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          PR_AUTHOR=$(gh pr view $PR_NUMBER --json author -q '.author.login')
          
          # Current date
          DATE=$(date +"%Y-%m-%d")
          
          # Generate release notes
          cat > release_note.md << EOF
          # Release $NEW_TAG
          
          **Released on:** $DATE  
          **Pull Request:** #$PR_NUMBER  
          **Author:** @$PR_AUTHOR  
          **Type:** $BUMP_TYPE release
          
          ## What's New
          
          **$PR_TITLE**
          
          $PR_BODY
          
          ---
          
          *This release was automatically generated from PR #$PR_NUMBER*
          EOF
          
          echo "Generated release notes:"
          cat release_note.md
          
          # Create temporary changelog entry
          cat > temp_changelog.md << EOF
          ## [$NEW_TAG] - $DATE
          
          ### $BUMP_TYPE Release
          
          **Pull Request:** [#$PR_NUMBER](https://github.com/${{ github.repository }}/pull/$PR_NUMBER)  
          **Author:** [@$PR_AUTHOR](https://github.com/$PR_AUTHOR)
          
          #### Changes
          
          $PR_BODY
          
          ---
          
          EOF
          
          # Update CHANGELOG.md by prepending new content
          if [ -f CHANGELOG.md ]; then
            # Create backup
            cp CHANGELOG.md CHANGELOG.md.bak
            
            # Check if this version already exists in changelog
            if ! grep -q "## \[$NEW_TAG\]" CHANGELOG.md; then
              # Add new entry at the top, preserving existing content
              {
                echo "# Changelog"
                echo ""
                echo "All notable changes to this project will be documented in this file."
                echo ""
                cat temp_changelog.md
                # Skip the header lines and add existing content
                tail -n +4 CHANGELOG.md 2>/dev/null || echo ""
              } > CHANGELOG.md.new
              mv CHANGELOG.md.new CHANGELOG.md
            else
              echo "Version $NEW_TAG already exists in CHANGELOG.md, skipping update"
            fi
          else
            # Create new CHANGELOG.md
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              cat temp_changelog.md
            } > CHANGELOG.md
          fi
          
          # Cleanup
          rm -f temp_changelog.md

      - name: Push tag
        run: |
          export PAT_TOKEN=${{ secrets.SKILLSWAP_PAT }}
          git config user.name "FrankOfTheScience"
          git config user.email "FrankOfTheScience@users.noreply.github.com"
          git remote set-url origin https://$PAT_TOKEN@github.com/${{ github.repository }}.git
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping tagging"
          else
            git tag $NEW_TAG
            git push origin $NEW_TAG
          fi

      - name: Commit and push changelog
        run: |
          export PAT_TOKEN=${{ secrets.SKILLSWAP_PAT }}
          git config user.name "FrankOfTheScience"
          git config user.email "FrankOfTheScience@users.noreply.github.com"
          git remote set-url origin https://$PAT_TOKEN@github.com/${{ github.repository }}.git
          
          # Check if CHANGELOG.md was actually modified
          if git diff --quiet CHANGELOG.md; then
            echo "No changes to CHANGELOG.md, skipping commit"
          else
            git add CHANGELOG.md
            git commit -m "docs: update changelog for $NEW_TAG [skip ci]"
            git push origin staging
            echo "CHANGELOG.md updated and pushed"
          fi

      - name: Create GitHub Release
        run: |
          export PAT_TOKEN=${{ secrets.SKILLSWAP_PAT }}
          export GH_TOKEN=$PAT_TOKEN
          
          # Check if the release already exists
          if gh release view $NEW_TAG >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists, updating..."
            gh release edit $NEW_TAG --notes-file release_note.md
          else
            echo "Creating new release $NEW_TAG..."
            gh release create $NEW_TAG \
              --title "Release $NEW_TAG" \
              --notes-file release_note.md \
              --draft=false \
              --prerelease=false
          fi
