name: CI Pipeline

on:
  push:
    branches:
      - development
      - staging
  pull_request:
    branches:
      - staging

env:
  NODE_VERSION: '20'
  DOTNET_VERSION: '8.0.x'

jobs:
  dev-ci:
    if: github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch all tags
        run: git fetch --tags

      # Setup .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Setup Node.js for frontend
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/skill-swap-web/package-lock.json

      # Backend build and test
      - name: Setup backend environment variables
        run: |
          echo "ConnectionStrings__DefaultConnection=${{ secrets.SKILLSWAP_DB_CONNECTION }}" >> $GITHUB_ENV
          echo "Jwt__Key=${{ secrets.SKILLSWAP_JWT_KEY }}" >> $GITHUB_ENV
          echo "Jwt__Issuer=${{ vars.JWT_ISSUER }}" >> $GITHUB_ENV
          echo "Jwt__Audience=${{ vars.JWT_AUDIENCE }}" >> $GITHUB_ENV

      - name: Restore backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore --configuration Release

      - name: Run backend tests with coverage
        run: |
          dotnet test SkillSwap.Tests/SkillSwap.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger trx \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=TestResults/coverage.opencover.xml \
            /p:Exclude="[*]SkillSwap.*.Migrations.*"

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: TestResults/

      # Frontend build
      - name: Install frontend dependencies
        run: |
          cd frontend/skill-swap-web
          npm ci

      - name: Setup frontend environment variables
        run: |
          cd frontend/skill-swap-web
          echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.DEV_API_BASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_APP_ENV=development" >> .env.production

      - name: Build frontend
        run: |
          cd frontend/skill-swap-web
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-dev
          path: frontend/skill-swap-web/.next/

  staging-release:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch all tags
        run: git fetch --tags

      # Setup .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Setup Node.js for frontend
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/skill-swap-web/package-lock.json

      # Backend build and test
      - name: Setup backend environment variables
        run: |
          echo "ConnectionStrings__DefaultConnection=${{ secrets.SKILLSWAP_DB_CONNECTION_STAGING }}" >> $GITHUB_ENV
          echo "Jwt__Key=${{ secrets.SKILLSWAP_JWT_KEY }}" >> $GITHUB_ENV
          echo "Jwt__Issuer=${{ vars.JWT_ISSUER }}" >> $GITHUB_ENV
          echo "Jwt__Audience=${{ vars.JWT_AUDIENCE }}" >> $GITHUB_ENV

      - name: Restore backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore --configuration Release

      - name: Run backend tests with coverage
        run: |
          dotnet test SkillSwap.Tests/SkillSwap.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger trx \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=TestResults/coverage.opencover.xml \
            /p:Exclude="[*]SkillSwap.*.Migrations.*"

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-staging
          path: TestResults/

      # Frontend build
      - name: Install frontend dependencies
        run: |
          cd frontend/skill-swap-web
          npm ci

      - name: Setup frontend environment variables
        run: |
          cd frontend/skill-swap-web
          echo "NEXT_PUBLIC_API_BASE_URL=${{ vars.STAGING_API_BASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_APP_ENV=staging" >> .env.production

      - name: Build frontend
        run: |
          cd frontend/skill-swap-web
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/skill-swap-web/.next/

      # GitHub CLI setup for release process
      - name: Install GitHub CLI
        run: sudo apt-get install -y gh jq

      - name: Determine bump type from PR label
        run: |
          export GH_TOKEN=${{ github.token }}
          PR_NUMBER=$(gh pr list --state merged --base staging --json number -L 1 | jq -r '.[0].number')
          BUMP_TYPE=$(gh pr view $PR_NUMBER --json labels -q '.labels[].name' | grep -E 'major|minor|patch' || echo "patch")
          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_ENV

      - name: Calculate next semver
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<<"${LAST_TAG#v}"
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0;;
            minor)
              MINOR=$((MINOR+1)); PATCH=0;;
            patch|*)
              PATCH=$((PATCH+1));;
          esac
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "Next version: $NEW_TAG"

      - name: Generate release note
        run: |
          export GH_TOKEN=${{ github.token }}
          PR_NUMBER=$(gh pr list --state merged --base staging --json number -L 1 | jq -r '.[0].number')
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          DATE=$(date +%Y-%m-%d)
          printf "## Release Note (%s)\n\n**PR #%s** - %s\n\n%s\n\nReleased on %s\n" \
            "$NEW_TAG" "$PR_NUMBER" "$PR_TITLE" "$PR_BODY" "$DATE" > release_note.md
          cat release_note.md

      - name: Push tag
        run: |
          export PAT_TOKEN=${{ secrets.SKILLSWAP_PAT }}
          git config user.name "FrankOfTheScience"
          git config user.email "FrankOfTheScience@users.noreply.github.com"
          git remote set-url origin https://$PAT_TOKEN@github.com/${{ github.repository }}.git
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping tagging"
          else
            git tag $NEW_TAG
            git push origin $NEW_TAG
          fi

      - name: Update CHANGELOG
        run: |
          export PAT_TOKEN=${{ secrets.SKILLSWAP_PAT }}
          git config user.name "FrankOfTheScience"
          git config user.email "FrankOfTheScience@users.noreply.github.com"
          git remote set-url origin https://$PAT_TOKEN@github.com/${{ github.repository }}.git
          echo "" >> CHANGELOG.md
          echo "## $NEW_TAG - $(date +%Y-%m-%d)" >> CHANGELOG.md
          cat release_note.md >> CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "docs: update changelog for $NEW_TAG [skip ci]" || echo "No changes"
          git push origin staging

      - name: Create GitHub Release (optional)
        run: |
          export PAT_TOKEN=${{ secrets.SKILLSWAP_PAT }}
          export GH_TOKEN=$PAT_TOKEN
          # Controlla se la release esiste già
          if gh release view $NEW_TAG >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists, skipping creation"
          else
            gh release create $NEW_TAG release_note.md \
              --title "$NEW_TAG" \
              --notes-file release_note.md
          fi
