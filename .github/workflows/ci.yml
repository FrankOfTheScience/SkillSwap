name: .NET CI

on:
  push:
    branches:
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout del repo
      - uses: actions/checkout@v3

      # Setup .NET 9
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      # Restore pacchetti
      - name: Restore dependencies
        run: dotnet restore

      # Build solution
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Test (per ora disabilitato)
