name: PR Template Automation - Debug

on:
  pull_request:
    types: [labeled, opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  debug-info:
    runs-on: ubuntu-latest
    steps:
      - name: Debug PR and Label Info
        uses: actions/github-script@v7
        with:
          script: |
            console.log('=== DEBUG INFO ===');
            console.log('Event name:', context.eventName);
            console.log('Action:', context.payload.action);
            console.log('PR number:', context.payload.pull_request?.number);
            console.log('PR title:', context.payload.pull_request?.title);
            console.log('PR labels:', context.payload.pull_request?.labels?.map(l => l.name));
            console.log('Label added:', context.payload.label?.name);
            console.log('==================');

  apply-template:
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled' && contains(github.event.label.name, 'patch')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply patch template
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Patch label detected, applying template...');
            
            // Simple test - just add a comment first
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🤖 **Test**: Patch label detected! Template automation is working.'
            });
            
            console.log('Test comment added successfully!');